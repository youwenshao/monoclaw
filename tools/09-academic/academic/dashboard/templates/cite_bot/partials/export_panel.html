<div x-data="exportPanel()" class="max-w-2xl mx-auto space-y-6">
    <div class="bg-[#1a1f36] rounded-lg p-5 space-y-5">
        <h3 class="text-sm font-semibold text-[#d4a843]">Export Bibliography</h3>
        <p class="text-xs text-gray-400">{{ total }} citation{{ 's' if total != 1 else '' }} available for export.</p>

        <!-- Format selector -->
        <div class="space-y-2">
            <label class="text-xs text-gray-400 block">Export Format</label>
            <div class="grid grid-cols-4 gap-2">
                <button @click="exportFormat = 'bibtex'"
                        :class="exportFormat === 'bibtex' ? 'bg-[#d4a843] text-[#0f1225] font-semibold' : 'bg-[#2d3352] text-gray-300 hover:bg-[#3d4562]'"
                        class="px-3 py-2.5 text-xs rounded-lg transition-colors text-center">
                    BibTeX
                </button>
                <button @click="exportFormat = 'ris'"
                        :class="exportFormat === 'ris' ? 'bg-[#d4a843] text-[#0f1225] font-semibold' : 'bg-[#2d3352] text-gray-300 hover:bg-[#3d4562]'"
                        class="px-3 py-2.5 text-xs rounded-lg transition-colors text-center">
                    RIS
                </button>
                <button @click="exportFormat = 'plain'"
                        :class="exportFormat === 'plain' ? 'bg-[#d4a843] text-[#0f1225] font-semibold' : 'bg-[#2d3352] text-gray-300 hover:bg-[#3d4562]'"
                        class="px-3 py-2.5 text-xs rounded-lg transition-colors text-center">
                    Plain Text
                </button>
                <button @click="exportFormat = 'word'"
                        :class="exportFormat === 'word' ? 'bg-[#d4a843] text-[#0f1225] font-semibold' : 'bg-[#2d3352] text-gray-300 hover:bg-[#3d4562]'"
                        class="px-3 py-2.5 text-xs rounded-lg transition-colors text-center">
                    Word
                </button>
            </div>
        </div>

        <!-- Style selector (for plain text) -->
        <div x-show="exportFormat === 'plain'" class="space-y-2">
            <label class="text-xs text-gray-400 block">Citation Style</label>
            <select x-model="exportStyle"
                    class="w-full bg-[#0f1225] border border-[#2d3352] rounded-lg px-3 py-2 text-sm text-gray-100 focus:ring-[#d4a843] focus:border-[#d4a843]">
                <option value="apa7">APA 7th Edition</option>
                <option value="harvard">Harvard</option>
                <option value="ieee">IEEE</option>
                <option value="gbt7714">GB/T 7714</option>
                <option value="chicago">Chicago</option>
                <option value="mla9">MLA 9th Edition</option>
            </select>
        </div>

        <!-- Project selector -->
        <div class="space-y-2">
            <label class="text-xs text-gray-400 block">Project (optional — export all if none selected)</label>
            <select x-model="exportProjectId"
                    class="w-full bg-[#0f1225] border border-[#2d3352] rounded-lg px-3 py-2 text-sm text-gray-100 focus:ring-[#d4a843] focus:border-[#d4a843]">
                <option value="">All Citations</option>
                {% for p in projects %}
                <option value="{{ p.id }}">{{ p.project_name }} ({{ p.default_style }})</option>
                {% endfor %}
            </select>
        </div>

        <!-- Export button -->
        <button @click="doExport()"
                :disabled="exporting"
                class="w-full py-2.5 rounded-lg text-sm font-semibold transition-colors
                       bg-[#d4a843] text-[#0f1225] hover:bg-[#c49a38]
                       disabled:opacity-40 disabled:cursor-not-allowed">
            <span x-show="!exporting">Export Bibliography</span>
            <span x-show="exporting" class="flex items-center justify-center gap-2">
                <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
                Exporting…
            </span>
        </button>

        <!-- Download result -->
        <div x-show="exportResult" class="bg-[#0f1225] rounded-lg p-4 border border-[#2d3352]">
            <p class="text-xs text-emerald-400 mb-2">Export ready — <span x-text="exportResult?.filename"></span></p>
            <pre class="text-xs text-gray-300 max-h-48 overflow-auto whitespace-pre-wrap" x-text="exportResult?.content"></pre>
            <button @click="downloadExport()"
                    class="mt-3 flex items-center gap-2 text-xs text-[#d4a843] hover:text-[#c49a38]">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/>
                </svg>
                Download File
            </button>
        </div>
    </div>
</div>

<script>
function exportPanel() {
    return {
        exportFormat: 'bibtex',
        exportStyle: 'apa7',
        exportProjectId: '',
        exporting: false,
        exportResult: null,

        async doExport() {
            this.exporting = true;
            this.exportResult = null;
            try {
                const body = {};
                if (this.exportProjectId) body.project_id = parseInt(this.exportProjectId);
                if (this.exportFormat === 'plain') body.style = this.exportStyle;
                const resp = await fetch('/cite-bot/export?format=' + this.exportFormat, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                this.exportResult = await resp.json();
            } catch (e) {
                this.exportResult = null;
            } finally {
                this.exporting = false;
            }
        },

        downloadExport() {
            if (!this.exportResult) return;
            const blob = new Blob([this.exportResult.content], { type: this.exportResult.content_type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = this.exportResult.filename;
            a.click();
            URL.revokeObjectURL(url);
        },
    };
}
</script>
