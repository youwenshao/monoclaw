<!-- htmx partial: systematic review workflow -->
<div class="space-y-6" x-data="{ showNewReview: false, selectedReview: null }">
    <!-- Header -->
    <div class="flex items-center justify-between">
        <div>
            <h3 class="text-sm font-semibold text-[#e0be6a]">Systematic Reviews</h3>
            <p class="text-xs text-gray-400 mt-0.5">PRISMA-guided screening and inclusion workflow</p>
        </div>
        <button @click="showNewReview = true"
                class="flex items-center gap-2 px-4 py-2 bg-[#d4a843] text-[#1a1f36] rounded-lg text-sm font-semibold hover:bg-[#e0be6a] transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
            New Review
        </button>
    </div>

    <!-- Review list -->
    <div id="review-list"
         hx-get="/paper-sieve/reviews"
         hx-trigger="load"
         hx-swap="innerHTML"
         hx-target="this">
        <div class="text-center py-8 text-gray-500 text-sm">Loading reviews...</div>
    </div>

    <!-- Inline rendering of reviews (populated by htmx JSON -> this is the fallback static view) -->
    <template x-if="false"><!-- Reviews loaded via HTMX or JS --></template>

    <!-- New Review Modal -->
    <div x-show="showNewReview" x-transition class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm" @click.self="showNewReview = false">
        <div class="bg-[#1a1f36] border border-[#2d3352] rounded-2xl w-full max-w-lg mx-4 shadow-2xl" @click.stop>
            <div class="p-5 border-b border-[#2d3352] flex items-center justify-between">
                <h3 class="text-lg font-semibold text-[#e0be6a]">New Systematic Review</h3>
                <button @click="showNewReview = false" class="text-gray-400 hover:text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <form @submit.prevent="
                fetch('/paper-sieve/reviews', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        review_name: $refs.rName.value,
                        research_question: $refs.rQuestion.value,
                        inclusion_criteria: $refs.rInclusion.value,
                        exclusion_criteria: $refs.rExclusion.value,
                    })
                }).then(() => {
                    showNewReview = false;
                    htmx.trigger('#review-list', 'load');
                })" class="p-5 space-y-4">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Review Name</label>
                    <input type="text" x-ref="rName" required
                           class="w-full bg-[#242b4a] border border-[#3d4466] rounded-lg px-3 py-2.5 text-sm text-white focus:border-[#d4a843] focus:outline-none"
                           placeholder="e.g. AI-assisted language learning in HK secondary schools">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Research Question</label>
                    <textarea x-ref="rQuestion" rows="2" required
                              class="w-full bg-[#242b4a] border border-[#3d4466] rounded-lg px-3 py-2.5 text-sm text-white focus:border-[#d4a843] focus:outline-none resize-none"
                              placeholder="What is the effect of..."></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Inclusion Criteria</label>
                        <textarea x-ref="rInclusion" rows="3"
                                  class="w-full bg-[#242b4a] border border-[#3d4466] rounded-lg px-3 py-2.5 text-sm text-white focus:border-[#d4a843] focus:outline-none resize-none"
                                  placeholder="- Peer-reviewed&#10;- Published 2018-2025&#10;- English or Chinese"></textarea>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Exclusion Criteria</label>
                        <textarea x-ref="rExclusion" rows="3"
                                  class="w-full bg-[#242b4a] border border-[#3d4466] rounded-lg px-3 py-2.5 text-sm text-white focus:border-[#d4a843] focus:outline-none resize-none"
                                  placeholder="- Conference abstracts only&#10;- Non-empirical"></textarea>
                    </div>
                </div>
                <div class="flex justify-end gap-3 pt-2">
                    <button type="button" @click="showNewReview = false"
                            class="px-4 py-2.5 text-sm text-gray-300 bg-[#242b4a] rounded-lg hover:bg-[#2d3352] transition-colors">Cancel</button>
                    <button type="submit"
                            class="px-6 py-2.5 text-sm font-semibold text-[#1a1f36] bg-[#d4a843] rounded-lg hover:bg-[#e0be6a] transition-colors">Create Review</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.body.addEventListener('htmx:beforeSwap', function(evt) {
    if (evt.detail.target && evt.detail.target.id === 'review-list') {
        try {
            const data = JSON.parse(evt.detail.serverResponse);
            if (Array.isArray(data)) {
                evt.detail.shouldSwap = true;
                evt.detail.serverResponse = renderReviewCards(data);
            }
        } catch (e) { /* not JSON, let htmx handle normally */ }
    }
});

function renderReviewCards(reviews) {
    if (!reviews.length) {
        return `
            <div class="text-center py-12">
                <svg class="w-12 h-12 mx-auto mb-3 text-gray-600 opacity-40" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15a2.25 2.25 0 012.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25z"/></svg>
                <p class="text-sm text-gray-500">No systematic reviews yet</p>
                <p class="text-xs text-gray-600 mt-1">Create a review to start screening papers</p>
            </div>`;
    }

    return `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">${reviews.map(r => {
        const counts = r.paper_counts || {};
        const statusColor = r.status === 'completed' ? 'emerald' : (r.status === 'screening' ? 'amber' : 'gray');
        return `
            <div class="bg-[#1a1f36] rounded-xl border border-[#2d3352] p-5 hover:border-[#3d4466] transition-colors">
                <div class="flex items-start justify-between mb-3">
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-semibold text-white">${r.review_name}</p>
                        <p class="text-xs text-gray-400 mt-1 line-clamp-2">${r.research_question}</p>
                    </div>
                    <span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-medium bg-${statusColor}-500/10 text-${statusColor}-400 border border-${statusColor}-500/20 ml-2 shrink-0">${r.status}</span>
                </div>

                <div class="grid grid-cols-4 gap-2 mb-3">
                    <div class="bg-[#0f1225] rounded-lg p-2 text-center">
                        <p class="text-xs text-gray-500">Total</p>
                        <p class="text-sm font-bold text-white">${counts.total || 0}</p>
                    </div>
                    <div class="bg-[#0f1225] rounded-lg p-2 text-center">
                        <p class="text-xs text-gray-500">Included</p>
                        <p class="text-sm font-bold text-emerald-400">${counts.included || 0}</p>
                    </div>
                    <div class="bg-[#0f1225] rounded-lg p-2 text-center">
                        <p class="text-xs text-gray-500">Excluded</p>
                        <p class="text-sm font-bold text-red-400">${counts.excluded || 0}</p>
                    </div>
                    <div class="bg-[#0f1225] rounded-lg p-2 text-center">
                        <p class="text-xs text-gray-500">Pending</p>
                        <p class="text-sm font-bold text-[#d4a843]">${counts.pending || 0}</p>
                    </div>
                </div>

                <div class="flex items-center justify-between pt-3 border-t border-[#2d3352]">
                    <span class="text-xs text-gray-500">${r.created_at || ''}</span>
                    <button class="px-3 py-1.5 text-xs bg-[#242b4a] text-gray-300 rounded-lg hover:bg-[#2d3352] border border-[#3d4466] transition-colors"
                            onclick="window.location.hash='review-${r.id}'">
                        Open Screening
                    </button>
                </div>
            </div>`;
    }).join('')}</div>`;
}
</script>
