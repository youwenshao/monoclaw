<div class="space-y-3">
    <div class="flex items-center justify-between mb-2">
        <h3 class="text-sm font-semibold text-gold-400">Field Preview — {{ form_type }}</h3>
        <span class="text-xs text-gray-500">{{ fields|length }} fields</span>
    </div>

    <div class="grid grid-cols-2 gap-3">
        {% for f in fields %}
        <div class="space-y-1">
            <label class="flex items-center gap-1.5 text-xs">
                {% if f.valid %}
                <svg class="w-3.5 h-3.5 text-emerald-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
                </svg>
                {% else %}
                <svg class="w-3.5 h-3.5 text-red-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
                {% endif %}
                <span class="{% if f.valid %}text-gray-300{% else %}text-red-300{% endif %} font-medium">
                    {{ f.label }}
                </span>
                {% if f.required %}
                <span class="text-red-500">*</span>
                {% endif %}
            </label>

            {% if f.field_type == 'checkbox' %}
            <div class="flex items-center gap-2 px-3 py-1.5 bg-navy-900 border rounded-lg text-sm
                        {% if f.valid %}border-navy-600{% else %}border-red-700{% endif %}">
                <input type="checkbox" {{ 'checked' if f.value and f.value|string|upper in ('Y','1','TRUE','YES') else '' }}
                       disabled
                       class="rounded border-navy-600 bg-navy-900 text-gold-500 focus:ring-gold-500">
                <span class="text-xs text-gray-400">{{ f.value or 'N' }}</span>
            </div>
            {% else %}
            <div class="relative">
                <input type="text" value="{{ f.value or '' }}"
                       readonly
                       maxlength="{{ f.max_chars }}"
                       class="w-full px-3 py-1.5 bg-navy-900 border rounded-lg text-sm text-gray-100
                              {% if f.valid %}border-navy-600{% else %}border-red-700 bg-red-950{% endif %}
                              focus:ring-gold-500 focus:border-gold-500"
                       {% if f.format_hint %}placeholder="{{ f.format_hint }}"{% endif %}>
                <span class="absolute right-2 top-1/2 -translate-y-1/2 text-[10px]
                            {% if f.char_count > f.max_chars %}text-red-400{% else %}text-gray-600{% endif %}">
                    {{ f.char_count }}/{{ f.max_chars }}
                </span>
            </div>
            {% endif %}
        </div>
        {% endfor %}
    </div>
</div>
