<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <!-- New subscription form -->
    <div class="bg-navy-800 rounded-lg p-5 border border-navy-700">
        <h3 class="text-sm font-semibold text-gold-400 mb-4">New Alert Subscription</h3>

        <form hx-post="/policy-watcher/subscriptions"
              hx-target="#subscriptions-table"
              hx-swap="outerHTML"
              hx-on::after-request="this.reset()"
              class="space-y-4">

            <div>
                <label class="block text-xs text-gray-400 mb-1">Consultant Name</label>
                <input type="text" name="consultant_name" required
                       class="w-full bg-navy-900 border border-navy-600 text-gray-200 text-sm rounded-lg px-3 py-2 placeholder-gray-500 focus:ring-gold-500 focus:border-gold-500"
                       placeholder="e.g. Alice Chan">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Phone (WhatsApp)</label>
                    <input type="tel" name="phone"
                           class="w-full bg-navy-900 border border-navy-600 text-gray-200 text-sm rounded-lg px-3 py-2 placeholder-gray-500 focus:ring-gold-500 focus:border-gold-500"
                           placeholder="+852...">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Email</label>
                    <input type="email" name="email"
                           class="w-full bg-navy-900 border border-navy-600 text-gray-200 text-sm rounded-lg px-3 py-2 placeholder-gray-500 focus:ring-gold-500 focus:border-gold-500"
                           placeholder="alice@firm.hk">
                </div>
            </div>

            <div>
                <label class="block text-xs text-gray-400 mb-1">Telegram ID</label>
                <input type="text" name="telegram_id"
                       class="w-full bg-navy-900 border border-navy-600 text-gray-200 text-sm rounded-lg px-3 py-2 placeholder-gray-500 focus:ring-gold-500 focus:border-gold-500"
                       placeholder="@username or chat ID">
            </div>

            <!-- Scheme checkboxes -->
            <div>
                <label class="block text-xs text-gray-400 mb-2">Schemes to Monitor</label>
                <div class="flex flex-wrap gap-3">
                    {% for scheme in ['GEP', 'ASMTP', 'QMAS', 'TTPS', 'TechTAS', 'IANG'] %}
                    <label class="flex items-center gap-1.5 cursor-pointer">
                        <input type="checkbox" name="schemes[]" value="{{ scheme }}"
                               class="w-3.5 h-3.5 rounded border-navy-600 bg-navy-900 text-gold-500 focus:ring-gold-500 focus:ring-offset-navy-800">
                        <span class="text-xs text-gray-300">{{ scheme }}</span>
                    </label>
                    {% endfor %}
                </div>
                <p class="text-xs text-gray-600 mt-1">Leave unchecked to receive alerts for all schemes.</p>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <!-- Urgency threshold -->
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Minimum Urgency</label>
                    <select name="urgency_threshold"
                            class="w-full bg-navy-900 border border-navy-600 text-gray-200 text-sm rounded-lg px-3 py-2 focus:ring-gold-500 focus:border-gold-500">
                        <option value="routine">All (Routine+)</option>
                        <option value="important" selected>Important+</option>
                        <option value="urgent">Urgent Only</option>
                    </select>
                </div>

                <!-- Channel -->
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Notification Channel</label>
                    <select name="channel"
                            class="w-full bg-navy-900 border border-navy-600 text-gray-200 text-sm rounded-lg px-3 py-2 focus:ring-gold-500 focus:border-gold-500">
                        <option value="whatsapp">WhatsApp</option>
                        <option value="telegram">Telegram</option>
                        <option value="email">Email</option>
                    </select>
                </div>
            </div>

            <button type="submit"
                    class="w-full px-4 py-2.5 bg-gold-500 hover:bg-gold-400 text-navy-900 text-sm font-semibold rounded-lg transition-colors">
                Create Subscription
            </button>
        </form>
    </div>

    <!-- Existing subscriptions -->
    <div id="subscriptions-table" class="bg-navy-800 rounded-lg border border-navy-700 overflow-hidden">
        <div class="p-4 border-b border-navy-700">
            <h3 class="text-sm font-semibold text-gold-400">Active Subscriptions</h3>
        </div>
        <div hx-get="/policy-watcher/subscriptions"
             hx-trigger="load"
             hx-target="#subs-body"
             hx-swap="innerHTML">
            <table class="w-full text-sm">
                <thead>
                    <tr class="text-xs text-gray-500 uppercase tracking-wider border-b border-navy-700">
                        <th class="text-left px-4 py-2">Consultant</th>
                        <th class="text-left px-4 py-2">Channel</th>
                        <th class="text-left px-4 py-2">Threshold</th>
                        <th class="text-left px-4 py-2">Schemes</th>
                        <th class="text-right px-4 py-2">Actions</th>
                    </tr>
                </thead>
                <tbody id="subs-body" class="divide-y divide-navy-700">
                    <tr>
                        <td colspan="5" class="text-center text-gray-500 py-6 text-xs">Loading subscriptions…</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
