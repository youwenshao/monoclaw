<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <!-- Today's Revenue -->
    <div class="bg-[#1a1f36] border border-[#2d3352] rounded-xl p-6">
        <div class="flex items-center justify-between mb-4">
            <div class="w-12 h-12 rounded-xl bg-emerald-500/10 flex items-center justify-center">
                <svg class="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <span class="text-xs text-gray-500 uppercase tracking-wider">Today</span>
        </div>
        <p class="text-3xl font-bold text-emerald-400 mb-1">HK${{ "{:,.2f}".format(today_revenue) }}</p>
        <p class="text-sm text-gray-400">Today's Revenue</p>
    </div>

    <!-- Pending Messages -->
    <div class="bg-[#1a1f36] border border-[#2d3352] rounded-xl p-6">
        <div class="flex items-center justify-between mb-4">
            <div class="w-12 h-12 rounded-xl bg-amber-500/10 flex items-center justify-center">
                <svg class="w-6 h-6 text-amber-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z"/>
                </svg>
            </div>
            {% if pending_messages > 0 %}
            <span class="px-2 py-0.5 text-xs font-bold bg-amber-500/20 text-amber-400 rounded-full">Action needed</span>
            {% endif %}
        </div>
        <p class="text-3xl font-bold {% if pending_messages > 0 %}text-amber-400{% else %}text-gray-300{% endif %} mb-1">{{ pending_messages }}</p>
        <p class="text-sm text-gray-400">Pending WhatsApp Messages</p>
    </div>

    <!-- Cash Position -->
    <div class="bg-[#1a1f36] border border-[#2d3352] rounded-xl p-6">
        <div class="flex items-center justify-between mb-4">
            <div class="w-12 h-12 rounded-xl bg-blue-500/10 flex items-center justify-center">
                <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z"/>
                </svg>
            </div>
            <span class="text-xs text-gray-500 uppercase tracking-wider">All-time</span>
        </div>
        <p class="text-3xl font-bold {% if cash_position >= 0 %}text-blue-400{% else %}text-red-400{% endif %} mb-1">HK${{ "{:,.2f}".format(cash_position) }}</p>
        <p class="text-sm text-gray-400">Cash Position</p>
    </div>
</div>

<!-- Revenue chart -->
<div class="mt-6 bg-[#1a1f36] border border-[#2d3352] rounded-xl p-6">
    <div class="flex items-center justify-between mb-4">
        <h3 class="text-sm font-semibold text-gray-200">Revenue Trend (7 days)</h3>
        <div class="flex gap-1">
            <button onclick="loadRevenueChart('week')" class="px-2 py-1 text-xs text-gray-400 hover:text-[#d4a843] rounded">Week</button>
            <button onclick="loadRevenueChart('month')" class="px-2 py-1 text-xs text-gray-400 hover:text-[#d4a843] rounded">Month</button>
        </div>
    </div>
    <canvas id="revenueChart" height="200"></canvas>
</div>

<script>
let revenueChartInstance = null;

function loadRevenueChart(period) {
    fetch('/biz-owner-os/analytics/revenue?period=' + (period || 'week'))
        .then(r => r.json())
        .then(data => {
            const ctx = document.getElementById('revenueChart');
            if (!ctx) return;
            if (revenueChartInstance) revenueChartInstance.destroy();
            revenueChartInstance = new Chart(ctx, {
                type: 'line',
                data: data,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { color: '#2d3352' }, ticks: { color: '#6b7280', font: { size: 11 } } },
                        y: { grid: { color: '#2d3352' }, ticks: { color: '#6b7280', font: { size: 11 }, callback: v => 'HK$' + v.toLocaleString() } }
                    }
                }
            });
        });
}

loadRevenueChart('week');
</script>
