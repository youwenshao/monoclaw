<div class="bg-[#1a1f36] border border-[#2d3352] rounded-lg p-4">
    <p class="text-xs text-gray-400 uppercase tracking-wide" x-text="lang==='zh' ? '今日預約' : 'Today\'s Appts'">Today's Appts</p>
    <p class="text-2xl font-bold text-gray-100 mt-1">{{ stats.today_total | default(0) }}</p>
</div>
<div class="bg-[#1a1f36] border border-[#2d3352] rounded-lg p-4">
    <p class="text-xs text-gray-400 uppercase tracking-wide" x-text="lang==='zh' ? '已完成' : 'Completed'">Completed</p>
    <p class="text-2xl font-bold text-green-400 mt-1">{{ stats.completed | default(0) }}</p>
</div>
<div class="bg-[#1a1f36] border border-[#2d3352] rounded-lg p-4">
    <p class="text-xs text-gray-400 uppercase tracking-wide" x-text="lang==='zh' ? '未到診' : 'No-Shows'">No-Shows</p>
    <p class="text-2xl font-bold text-red-400 mt-1">{{ stats.no_shows | default(0) }}</p>
</div>
<div class="bg-[#1a1f36] border border-[#2d3352] rounded-lg p-4">
    <p class="text-xs text-gray-400 uppercase tracking-wide" x-text="lang==='zh' ? '即時到診' : 'Walk-Ins'">Walk-Ins</p>
    <p class="text-2xl font-bold text-blue-400 mt-1">{{ stats.walk_ins | default(0) }}</p>
</div>
<div class="bg-[#1a1f36] border border-[#2d3352] rounded-lg p-4">
    <p class="text-xs text-gray-400 uppercase tracking-wide" x-text="lang==='zh' ? '平均等候' : 'Avg Wait'">Avg Wait</p>
    <p class="text-2xl font-bold text-amber-400 mt-1">{{ stats.avg_wait | default('—') }}<span class="text-sm font-normal text-gray-400">min</span></p>
</div>
