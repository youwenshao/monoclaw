<form hx-post="/scribe-ai/api/consultations/{{ consultation.id }}/soap" hx-target="#soap-editor" hx-swap="innerHTML"
      class="space-y-4">
    <!-- Subjective -->
    <div class="soap-section soap-subjective" x-data="{ collapsed: false }">
        <h4 @click="collapsed = !collapsed" class="cursor-pointer flex items-center gap-2">
            <span x-text="lang==='zh' ? '主觀' : 'Subjective'">Subjective</span>
            <svg :class="collapsed && 'rotate-180'" class="w-3 h-3 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
        </h4>
        <textarea x-show="!collapsed" name="subjective" rows="4"
                  class="w-full bg-[#0f1225] border border-[#2d3352] rounded px-3 py-2 text-sm text-gray-200 mt-2 focus:outline-none focus:border-[#d4a843] resize-y"
                  placeholder="Chief complaint, HPI, ROS…">{{ consultation.subjective | default('') }}</textarea>
    </div>

    <!-- Objective -->
    <div class="soap-section soap-objective" x-data="{ collapsed: false }">
        <h4 @click="collapsed = !collapsed" class="cursor-pointer flex items-center gap-2">
            <span x-text="lang==='zh' ? '客觀' : 'Objective'">Objective</span>
            <svg :class="collapsed && 'rotate-180'" class="w-3 h-3 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
        </h4>
        <textarea x-show="!collapsed" name="objective" rows="4"
                  class="w-full bg-[#0f1225] border border-[#2d3352] rounded px-3 py-2 text-sm text-gray-200 mt-2 focus:outline-none focus:border-[#d4a843] resize-y"
                  placeholder="Vitals, exam findings, test results…">{{ consultation.objective | default('') }}</textarea>
    </div>

    <!-- Assessment -->
    <div class="soap-section soap-assessment" x-data="{ collapsed: false }">
        <h4 @click="collapsed = !collapsed" class="cursor-pointer flex items-center gap-2">
            <span x-text="lang==='zh' ? '評估' : 'Assessment'">Assessment</span>
            <svg :class="collapsed && 'rotate-180'" class="w-3 h-3 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
        </h4>
        <textarea x-show="!collapsed" name="assessment" rows="4"
                  class="w-full bg-[#0f1225] border border-[#2d3352] rounded px-3 py-2 text-sm text-gray-200 mt-2 focus:outline-none focus:border-[#d4a843] resize-y"
                  placeholder="Diagnosis, differential, clinical reasoning…">{{ consultation.assessment | default('') }}</textarea>
    </div>

    <!-- Plan -->
    <div class="soap-section soap-plan" x-data="{ collapsed: false }">
        <h4 @click="collapsed = !collapsed" class="cursor-pointer flex items-center gap-2">
            <span x-text="lang==='zh' ? '計劃' : 'Plan'">Plan</span>
            <svg :class="collapsed && 'rotate-180'" class="w-3 h-3 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
        </h4>
        <textarea x-show="!collapsed" name="plan" rows="4"
                  class="w-full bg-[#0f1225] border border-[#2d3352] rounded px-3 py-2 text-sm text-gray-200 mt-2 focus:outline-none focus:border-[#d4a843] resize-y"
                  placeholder="Treatment plan, prescriptions, follow-up…">{{ consultation.plan | default('') }}</textarea>
    </div>

    <div class="flex justify-end gap-3 pt-2">
        <button type="submit"
                class="bg-[#d4a843] text-[#0f1225] px-5 py-2 rounded-lg text-sm font-semibold hover:bg-[#e0be6a] transition-colors">
            Save SOAP Note 保存病歷
        </button>
    </div>
</form>
