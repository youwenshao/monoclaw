<div x-data="{
    coType: 'general',
    products: [{description:'', hs_code:'', quantity:0, value:0, unit:'pieces', country_of_origin:'Hong Kong', origin_criterion:'', hk_value_added_pct:0}],
    submitting: false,
    result: null,
    eligibilityResult: null,
    addProduct() { this.products.push({description:'', hs_code:'', quantity:0, value:0, unit:'pieces', country_of_origin:'Hong Kong', origin_criterion:'', hk_value_added_pct:0}) },
    removeProduct(idx) { if(this.products.length > 1) this.products.splice(idx, 1) },
    async checkEligibility(idx) {
        const p = this.products[idx];
        this.eligibilityResult = null;
        const qualifies = (p.origin_criterion === 'substantial_transformation' || p.origin_criterion === 'wholly_obtained' || p.hk_value_added_pct >= 30);
        this.eligibilityResult = { index: idx, eligible: qualifies, product: p.description || 'Item ' + (idx+1) };
    },
    async submit() {
        this.submitting = true;
        this.result = null;
        const form = this.$refs.coForm;
        const fd = new FormData(form);
        const payload = {
            co_type: this.coType,
            exporter: { name: fd.get('exporter_name'), address: fd.get('exporter_address'), br_number: fd.get('exporter_br') },
            consignee: { name: fd.get('consignee_name'), address: fd.get('consignee_address'), country: fd.get('consignee_country') },
            products: this.products,
            transport_mode: fd.get('transport_mode'),
            vessel_flight: fd.get('vessel_flight'),
            port_of_discharge: fd.get('port_of_discharge'),
            factory_registration: fd.get('factory_registration') || '',
            currency: fd.get('currency')
        };
        try {
            const resp = await fetch('/trade-doc-ai/api/co', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify(payload)
            });
            this.result = await resp.json();
        } catch(e) { this.result = {error: e.message}; }
        this.submitting = false;
    }
}">
    <h2 class="text-lg font-semibold text-gray-100 mb-1">Certificate of Origin</h2>
    <p class="text-sm text-gray-400 mb-6">Apply for a Certificate of Origin — general, CEPA, or ASEAN-HK FTA.</p>

    <form x-ref="coForm" @submit.prevent="submit()" class="space-y-6">
        <!-- CO Type selector -->
        <div>
            <label class="block text-xs font-medium text-gray-400 mb-2">CO Type</label>
            <div class="flex gap-3">
                <button type="button" @click="coType='general'"
                        :class="coType==='general' ? 'bg-gold-500/20 border-gold-500 text-gold-400' : 'bg-navy-800 border-navy-600 text-gray-400 hover:border-navy-500'"
                        class="flex-1 border rounded-lg px-4 py-3 text-sm font-medium transition-colors text-center">
                    General CO
                </button>
                <button type="button" @click="coType='cepa'"
                        :class="coType==='cepa' ? 'bg-gold-500/20 border-gold-500 text-gold-400' : 'bg-navy-800 border-navy-600 text-gray-400 hover:border-navy-500'"
                        class="flex-1 border rounded-lg px-4 py-3 text-sm font-medium transition-colors text-center">
                    CEPA
                </button>
                <button type="button" @click="coType='asean_hk'"
                        :class="coType==='asean_hk' ? 'bg-gold-500/20 border-gold-500 text-gold-400' : 'bg-navy-800 border-navy-600 text-gray-400 hover:border-navy-500'"
                        class="flex-1 border rounded-lg px-4 py-3 text-sm font-medium transition-colors text-center">
                    ASEAN-HK FTA
                </button>
            </div>
        </div>

        <!-- CEPA-specific field -->
        <div x-show="coType==='cepa'" x-cloak>
            <label class="block text-xs font-medium text-gray-400 mb-1.5">Factory Registration Number</label>
            <input type="text" name="factory_registration" placeholder="TID factory registration number"
                   class="w-full bg-navy-800 border border-navy-600 text-gray-200 text-sm rounded-lg px-3 py-2.5 placeholder-gray-500 focus:ring-gold-500 focus:border-gold-500">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">Transport</label>
                <select name="transport_mode"
                        class="w-full bg-navy-800 border border-navy-600 text-gray-200 text-sm rounded-lg px-3 py-2.5 focus:ring-gold-500 focus:border-gold-500">
                    <option value="sea">Sea</option>
                    <option value="air">Air</option>
                    <option value="land">Land</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">Vessel / Flight</label>
                <input type="text" name="vessel_flight" placeholder="Vessel or flight number"
                       class="w-full bg-navy-800 border border-navy-600 text-gray-200 text-sm rounded-lg px-3 py-2.5 placeholder-gray-500 focus:ring-gold-500 focus:border-gold-500">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">Currency</label>
                <select name="currency"
                        class="w-full bg-navy-800 border border-navy-600 text-gray-200 text-sm rounded-lg px-3 py-2.5 focus:ring-gold-500 focus:border-gold-500">
                    <option value="HKD">HKD</option>
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="CNY">CNY</option>
                </select>
            </div>
        </div>

        <!-- Exporter / Consignee -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-3">
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Exporter</h3>
                <input type="text" name="exporter_name" placeholder="Company name"
                       class="w-full bg-navy-800 border border-navy-600 text-gray-200 text-sm rounded-lg px-3 py-2 placeholder-gray-500 focus:ring-gold-500 focus:border-gold-500">
                <input type="text" name="exporter_address" placeholder="Address"
                       class="w-full bg-navy-800 border border-navy-600 text-gray-200 text-sm rounded-lg px-3 py-2 placeholder-gray-500 focus:ring-gold-500 focus:border-gold-500">
                <input type="text" name="exporter_br" placeholder="BR number"
                       class="w-full bg-navy-800 border border-navy-600 text-gray-200 text-sm rounded-lg px-3 py-2 placeholder-gray-500 focus:ring-gold-500 focus:border-gold-500">
            </div>
            <div class="space-y-3">
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Consignee</h3>
                <input type="text" name="consignee_name" placeholder="Company name"
                       class="w-full bg-navy-800 border border-navy-600 text-gray-200 text-sm rounded-lg px-3 py-2 placeholder-gray-500 focus:ring-gold-500 focus:border-gold-500">
                <input type="text" name="consignee_address" placeholder="Address"
                       class="w-full bg-navy-800 border border-navy-600 text-gray-200 text-sm rounded-lg px-3 py-2 placeholder-gray-500 focus:ring-gold-500 focus:border-gold-500">
                <input type="text" name="consignee_country" placeholder="Country"
                       class="w-full bg-navy-800 border border-navy-600 text-gray-200 text-sm rounded-lg px-3 py-2 placeholder-gray-500 focus:ring-gold-500 focus:border-gold-500">
                <input type="text" name="port_of_discharge" placeholder="Port of discharge"
                       class="w-full bg-navy-800 border border-navy-600 text-gray-200 text-sm rounded-lg px-3 py-2 placeholder-gray-500 focus:ring-gold-500 focus:border-gold-500">
            </div>
        </div>

        <!-- Products -->
        <div>
            <div class="flex items-center justify-between mb-3">
                <label class="text-xs font-medium text-gray-400">Products</label>
                <button type="button" @click="addProduct()"
                        class="text-xs text-gold-400 hover:text-gold-300 font-medium transition-colors">+ Add Product</button>
            </div>
            <div class="space-y-3">
                <template x-for="(prod, idx) in products" :key="idx">
                    <div class="bg-navy-800 border border-navy-700 rounded-lg p-4 space-y-3">
                        <div class="flex items-center justify-between">
                            <span class="text-xs text-gray-500">Product <span x-text="idx+1"></span></span>
                            <button type="button" @click="removeProduct(idx)" x-show="products.length > 1"
                                    class="text-red-400 hover:text-red-300 text-xs transition-colors">Remove</button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                            <input type="text" x-model="prod.description" placeholder="Product description"
                                   class="w-full bg-navy-900 border border-navy-600 text-gray-200 text-xs rounded px-3 py-2 placeholder-gray-500 focus:ring-gold-500 focus:border-gold-500">
                            <input type="text" x-model="prod.hs_code" placeholder="HS Code"
                                   class="w-full bg-navy-900 border border-navy-600 text-gray-200 text-xs rounded px-3 py-2 font-mono placeholder-gray-500 focus:ring-gold-500 focus:border-gold-500">
                            <input type="number" x-model.number="prod.value" placeholder="Value" min="0" step="0.01"
                                   class="w-full bg-navy-900 border border-navy-600 text-gray-200 text-xs rounded px-3 py-2 placeholder-gray-500 focus:ring-gold-500 focus:border-gold-500">
                        </div>
                        <!-- CEPA / ASEAN origin criteria -->
                        <div x-show="coType !== 'general'" class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[10px] text-gray-500 mb-1">Origin Criterion</label>
                                <select x-model="prod.origin_criterion"
                                        class="w-full bg-navy-900 border border-navy-600 text-gray-200 text-xs rounded px-2 py-1.5 focus:ring-gold-500 focus:border-gold-500">
                                    <option value="">Select...</option>
                                    <option value="wholly_obtained">Wholly obtained</option>
                                    <option value="substantial_transformation">Substantial transformation</option>
                                    <option value="rvc">Regional Value Content (RVC)</option>
                                    <option value="ctc">Change in Tariff Classification (CTC)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] text-gray-500 mb-1">HK Value-Added %</label>
                                <div class="flex gap-2">
                                    <input type="number" x-model.number="prod.hk_value_added_pct" min="0" max="100"
                                           class="flex-1 bg-navy-900 border border-navy-600 text-gray-200 text-xs rounded px-2 py-1.5 focus:ring-gold-500 focus:border-gold-500">
                                    <button type="button" @click="checkEligibility(idx)" x-show="coType==='cepa'"
                                            class="px-3 py-1.5 bg-navy-700 hover:bg-navy-600 text-xs text-gold-400 rounded transition-colors">
                                        Check
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- Eligibility result -->
        <template x-if="eligibilityResult">
            <div :class="eligibilityResult.eligible ? 'bg-emerald-500/10 border-emerald-500/30' : 'bg-red-500/10 border-red-500/30'"
                 class="border rounded-lg p-3">
                <p class="text-sm" :class="eligibilityResult.eligible ? 'text-emerald-400' : 'text-red-400'">
                    <span x-text="eligibilityResult.product"></span>:
                    <span x-text="eligibilityResult.eligible ? 'Likely eligible under CEPA rules of origin' : 'May not qualify — HK value-added must be ≥ 30% or product must undergo substantial transformation'"></span>
                </p>
            </div>
        </template>

        <button type="submit" :disabled="submitting"
                class="px-6 py-2.5 bg-gold-500 hover:bg-gold-400 disabled:opacity-50 text-navy-900 text-sm font-semibold rounded-lg transition-colors">
            <span x-show="!submitting">Submit CO Application</span>
            <span x-show="submitting" class="flex items-center gap-2">
                <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
                Submitting...
            </span>
        </button>
    </form>

    <!-- Result -->
    <template x-if="result && !result.error">
        <div class="mt-6 bg-emerald-500/10 border border-emerald-500/30 rounded-lg p-4">
            <div class="flex items-center gap-2 mb-2">
                <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span class="text-sm font-semibold text-emerald-400">CO Application Created</span>
            </div>
            <p class="text-sm text-gray-300">
                CO ID: <span class="font-mono text-gold-400" x-text="result.co_id"></span>
                — Issuing body: <span x-text="result.application?.issuing_body || 'TID'"></span>
            </p>
        </div>
    </template>
</div>
