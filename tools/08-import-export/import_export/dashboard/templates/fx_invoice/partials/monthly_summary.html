<div x-data="monthlySummary()" x-init="loadSummary()" class="space-y-6">
    <!-- Month selector -->
    <div class="flex items-end gap-4 bg-navy-800 rounded-xl border border-navy-700 p-5">
        <div>
            <label class="block text-xs text-gray-400 mb-1">Year</label>
            <select x-model.number="year"
                    class="bg-navy-900 border border-navy-600 text-gray-200 rounded-lg px-3 py-2 text-sm focus:border-gold-400 focus:outline-none">
                <option value="2024">2024</option>
                <option value="2025">2025</option>
                <option value="2026">2026</option>
            </select>
        </div>
        <button @click="loadSummary()"
                class="px-5 py-2.5 bg-gold-500 text-navy-900 rounded-lg font-medium text-sm hover:bg-gold-400 transition-colors">
            Load
        </button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- FX Exposure chart -->
        <div class="bg-navy-800 rounded-xl border border-navy-700 p-5">
            <h3 class="text-sm font-semibold text-gold-400 mb-4">Monthly FX Gain/Loss</h3>
            <div class="h-64">
                <canvas id="monthly-fx-chart"></canvas>
            </div>
        </div>

        <!-- Aging overview chart -->
        <div class="bg-navy-800 rounded-xl border border-navy-700 p-5">
            <h3 class="text-sm font-semibold text-gold-400 mb-4">Aging Overview (HKD)</h3>
            <div class="h-64">
                <canvas id="aging-chart"></canvas>
            </div>
        </div>
    </div>

    <!-- Summary table -->
    <div class="bg-navy-800 rounded-xl border border-navy-700 overflow-hidden">
        <div class="px-5 py-3 border-b border-navy-700">
            <h3 class="text-sm font-semibold text-white">Monthly Summary</h3>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-navy-900/50">
                    <tr>
                        <th class="px-4 py-2.5 text-left text-xs font-medium text-gray-400 uppercase">Month</th>
                        <th class="px-4 py-2.5 text-right text-xs font-medium text-gray-400 uppercase">Payments</th>
                        <th class="px-4 py-2.5 text-right text-xs font-medium text-gray-400 uppercase">Total HKD</th>
                        <th class="px-4 py-2.5 text-right text-xs font-medium text-gray-400 uppercase">FX Gain/Loss</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="row in summaryData" :key="row.month">
                        <tr class="border-b border-navy-700/50 hover:bg-navy-700/30">
                            <td class="px-4 py-2.5 text-gray-300" x-text="row.month"></td>
                            <td class="px-4 py-2.5 text-right text-gray-300" x-text="row.payment_count"></td>
                            <td class="px-4 py-2.5 text-right text-gray-200" x-text="'HKD ' + (row.total_hkd || 0).toLocaleString('en', {minimumFractionDigits: 2})"></td>
                            <td class="px-4 py-2.5 text-right font-medium"
                                :class="(row.fx_gain_loss || 0) >= 0 ? 'text-emerald-400' : 'text-red-400'"
                                x-text="'HKD ' + (row.fx_gain_loss || 0).toLocaleString('en', {minimumFractionDigits: 2})"></td>
                        </tr>
                    </template>
                </tbody>
                <tfoot class="bg-navy-900/50">
                    <tr>
                        <td class="px-4 py-2.5 text-xs font-semibold text-gray-400 uppercase">Year Total</td>
                        <td class="px-4 py-2.5 text-right font-semibold text-gray-300"
                            x-text="summaryData.reduce((s, r) => s + r.payment_count, 0)"></td>
                        <td class="px-4 py-2.5 text-right font-semibold text-gray-200"
                            x-text="'HKD ' + summaryData.reduce((s, r) => s + (r.total_hkd || 0), 0).toLocaleString('en', {minimumFractionDigits: 2})"></td>
                        <td class="px-4 py-2.5 text-right font-bold"
                            :class="summaryData.reduce((s, r) => s + (r.fx_gain_loss || 0), 0) >= 0 ? 'text-emerald-400' : 'text-red-400'"
                            x-text="'HKD ' + summaryData.reduce((s, r) => s + (r.fx_gain_loss || 0), 0).toLocaleString('en', {minimumFractionDigits: 2})"></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>
</div>

<script>
function monthlySummary() {
    return {
        year: new Date().getFullYear(),
        summaryData: [],
        agingData: null,

        async loadSummary() {
            try {
                const [fxResp, agingResp] = await Promise.all([
                    fetch('/fx-invoice/api/fx-summary'),
                    fetch('/fx-invoice/api/aging-report'),
                ]);
                const fxData = await fxResp.json();
                this.agingData = await agingResp.json();

                this.summaryData = fxData.filter(r => r.month && r.month.startsWith(String(this.year)));
                this.renderFxChart();
                this.renderAgingChart();
            } catch (e) {
                console.warn('Failed to load summary', e);
            }
        },

        renderFxChart() {
            const canvas = document.getElementById('monthly-fx-chart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');

            if (window._monthlyFxChart) window._monthlyFxChart.destroy();

            const labels = this.summaryData.map(r => r.month);
            const values = this.summaryData.map(r => r.fx_gain_loss || 0);
            const colors = values.map(v => v >= 0 ? 'rgba(52, 211, 153, 0.8)' : 'rgba(248, 113, 113, 0.8)');

            window._monthlyFxChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        label: 'FX Gain/Loss (HKD)',
                        data: values,
                        backgroundColor: colors,
                        borderRadius: 4,
                    }],
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { display: false } },
                        y: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: '#1e293b' } },
                    },
                },
            });
        },

        renderAgingChart() {
            const canvas = document.getElementById('aging-chart');
            if (!canvas || !this.agingData) return;
            const ctx = canvas.getContext('2d');

            if (window._agingChart) window._agingChart.destroy();

            const totals = this.agingData.totals || {};

            window._agingChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Current', '1–30 days', '31–60 days', '90+ days'],
                    datasets: [{
                        data: [
                            totals.current?.hkd || 0,
                            totals['30_days']?.hkd || 0,
                            totals['60_days']?.hkd || 0,
                            totals['90_plus']?.hkd || 0,
                        ],
                        backgroundColor: [
                            'rgba(52, 211, 153, 0.8)',
                            'rgba(251, 191, 36, 0.8)',
                            'rgba(251, 146, 60, 0.8)',
                            'rgba(248, 113, 113, 0.8)',
                        ],
                        borderWidth: 0,
                    }],
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#94a3b8', font: { size: 11 }, padding: 12 },
                        },
                    },
                },
            });
        },
    };
}
</script>
