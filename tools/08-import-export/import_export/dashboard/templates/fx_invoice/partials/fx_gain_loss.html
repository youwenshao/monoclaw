<div x-data="fxGainLoss()" x-init="loadData()" class="space-y-6">
    <!-- Date range selector -->
    <div class="flex items-end gap-4 bg-navy-800 rounded-xl border border-navy-700 p-5">
        <div>
            <label class="block text-xs text-gray-400 mb-1">From</label>
            <input type="date" x-model="dateFrom"
                   class="bg-navy-900 border border-navy-600 text-gray-200 rounded-lg px-3 py-2 text-sm focus:border-gold-400 focus:outline-none">
        </div>
        <div>
            <label class="block text-xs text-gray-400 mb-1">To</label>
            <input type="date" x-model="dateTo"
                   class="bg-navy-900 border border-navy-600 text-gray-200 rounded-lg px-3 py-2 text-sm focus:border-gold-400 focus:outline-none">
        </div>
        <button @click="loadData()"
                class="px-5 py-2.5 bg-gold-500 text-navy-900 rounded-lg font-medium text-sm hover:bg-gold-400 transition-colors">
            Apply
        </button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Summary cards -->
        <div class="space-y-3">
            <div class="bg-navy-800 rounded-xl border border-navy-700 p-5">
                <p class="text-xs text-gray-400 uppercase tracking-wider mb-1">Total FX Gain/Loss</p>
                <p class="text-2xl font-bold"
                   :class="totalGainLoss >= 0 ? 'text-emerald-400' : 'text-red-400'">
                    HKD <span x-text="totalGainLoss.toFixed(2)"></span>
                </p>
            </div>
            <div class="bg-navy-800 rounded-xl border border-navy-700 p-5">
                <p class="text-xs text-gray-400 uppercase tracking-wider mb-1">Payments in Period</p>
                <p class="text-2xl font-bold text-white" x-text="payments.length"></p>
            </div>

            <!-- Per-currency summary -->
            <div class="bg-navy-800 rounded-xl border border-navy-700 p-5">
                <p class="text-xs text-gold-400 uppercase tracking-wider mb-3">By Currency</p>
                <div class="space-y-2">
                    <template x-for="(val, cur) in currencySummary" :key="cur">
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-300" x-text="cur"></span>
                            <span :class="val >= 0 ? 'text-emerald-400' : 'text-red-400'"
                                  x-text="'HKD ' + val.toFixed(2)"></span>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <!-- Detail table -->
        <div class="lg:col-span-2 bg-navy-800 rounded-xl border border-navy-700 overflow-hidden">
            <div class="px-5 py-3 border-b border-navy-700">
                <h3 class="text-sm font-semibold text-white">FX Gain/Loss Detail</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-navy-900/50">
                        <tr>
                            <th class="px-4 py-2.5 text-left text-xs font-medium text-gray-400 uppercase">Date</th>
                            <th class="px-4 py-2.5 text-left text-xs font-medium text-gray-400 uppercase">Invoice</th>
                            <th class="px-4 py-2.5 text-left text-xs font-medium text-gray-400 uppercase">Currency</th>
                            <th class="px-4 py-2.5 text-right text-xs font-medium text-gray-400 uppercase">Amount</th>
                            <th class="px-4 py-2.5 text-right text-xs font-medium text-gray-400 uppercase">Inv Rate</th>
                            <th class="px-4 py-2.5 text-right text-xs font-medium text-gray-400 uppercase">Pmt Rate</th>
                            <th class="px-4 py-2.5 text-right text-xs font-medium text-gray-400 uppercase">FX G/L (HKD)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="p in payments" :key="p.id">
                            <tr class="border-b border-navy-700/50 hover:bg-navy-700/30">
                                <td class="px-4 py-2.5 text-gray-300" x-text="p.payment_date || '—'"></td>
                                <td class="px-4 py-2.5 text-gray-300" x-text="p.invoice_number || '#' + p.invoice_id"></td>
                                <td class="px-4 py-2.5 text-gray-300" x-text="p.currency || '—'"></td>
                                <td class="px-4 py-2.5 text-right text-gray-200" x-text="(p.amount || 0).toFixed(2)"></td>
                                <td class="px-4 py-2.5 text-right text-gray-400" x-text="(p.invoice_rate || 0).toFixed(4)"></td>
                                <td class="px-4 py-2.5 text-right text-gray-400" x-text="(p.fx_rate_at_payment || 0).toFixed(4)"></td>
                                <td class="px-4 py-2.5 text-right font-medium"
                                    :class="(p.fx_gain_loss || 0) >= 0 ? 'text-emerald-400' : 'text-red-400'"
                                    x-text="(p.fx_gain_loss || 0).toFixed(2)"></td>
                            </tr>
                        </template>
                    </tbody>
                    <tfoot class="bg-navy-900/50">
                        <tr>
                            <td colspan="6" class="px-4 py-2.5 text-right text-xs font-semibold text-gray-400 uppercase">Running Total</td>
                            <td class="px-4 py-2.5 text-right font-bold"
                                :class="totalGainLoss >= 0 ? 'text-emerald-400' : 'text-red-400'"
                                x-text="'HKD ' + totalGainLoss.toFixed(2)"></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
function fxGainLoss() {
    const now = new Date();
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    return {
        dateFrom: monthStart.toISOString().split('T')[0],
        dateTo: now.toISOString().split('T')[0],
        payments: [],

        get totalGainLoss() {
            return this.payments.reduce((s, p) => s + (p.fx_gain_loss || 0), 0);
        },

        get currencySummary() {
            const summary = {};
            this.payments.forEach(p => {
                const cur = p.currency || 'HKD';
                summary[cur] = (summary[cur] || 0) + (p.fx_gain_loss || 0);
            });
            return summary;
        },

        async loadData() {
            try {
                const resp = await fetch('/fx-invoice/api/payments');
                const all = await resp.json();
                this.payments = all.filter(p => {
                    const d = p.payment_date || '';
                    return d >= this.dateFrom && d <= this.dateTo;
                });
            } catch (e) {
                console.warn('Failed to load payments', e);
            }
        },
    };
}
</script>
