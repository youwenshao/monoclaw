<div x-data="invoiceBuilder()" class="space-y-6">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Invoice form -->
        <div class="lg:col-span-2 space-y-4">
            <div class="bg-navy-800 rounded-xl border border-navy-700 p-5">
                <h3 class="text-sm font-semibold text-gold-400 mb-4">New Invoice</h3>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <!-- Customer -->
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Customer</label>
                        <select x-model="form.customer_id" @change="onCustomerChange()"
                                class="w-full bg-navy-900 border border-navy-600 text-gray-200 rounded-lg px-3 py-2 text-sm focus:border-gold-400 focus:outline-none">
                            <option value="">— Select customer —</option>
                            {% for c in customers %}
                            <option value="{{ c.id }}"
                                    data-currency="{{ c.default_currency }}"
                                    data-terms="{{ c.payment_terms_days }}">
                                {{ c.company_name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Invoice type -->
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Invoice Type</label>
                        <select x-model="form.invoice_type"
                                class="w-full bg-navy-900 border border-navy-600 text-gray-200 rounded-lg px-3 py-2 text-sm focus:border-gold-400 focus:outline-none">
                            <option value="sales">Sales Invoice</option>
                            <option value="purchase">Purchase Invoice</option>
                            <option value="debit_note">Debit Note</option>
                            <option value="credit_note">Credit Note</option>
                        </select>
                    </div>

                    <!-- Currency -->
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Currency</label>
                        <select x-model="form.currency" @change="fetchRate()"
                                class="w-full bg-navy-900 border border-navy-600 text-gray-200 rounded-lg px-3 py-2 text-sm focus:border-gold-400 focus:outline-none">
                            <option value="HKD">HKD — Hong Kong Dollar</option>
                            <option value="USD">USD — US Dollar</option>
                            <option value="CNH">CNH — Offshore Renminbi</option>
                            <option value="EUR">EUR — Euro</option>
                            <option value="GBP">GBP — British Pound</option>
                            <option value="JPY">JPY — Japanese Yen</option>
                            <option value="SGD">SGD — Singapore Dollar</option>
                        </select>
                    </div>

                    <!-- Incoterms -->
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Incoterms</label>
                        <select x-model="form.incoterms"
                                class="w-full bg-navy-900 border border-navy-600 text-gray-200 rounded-lg px-3 py-2 text-sm focus:border-gold-400 focus:outline-none">
                            <option value="">— None —</option>
                            <option value="FOB">FOB — Free on Board</option>
                            <option value="CIF">CIF — Cost, Insurance & Freight</option>
                            <option value="CFR">CFR — Cost & Freight</option>
                            <option value="EXW">EXW — Ex Works</option>
                            <option value="DDP">DDP — Delivered Duty Paid</option>
                        </select>
                    </div>

                    <!-- Invoice date -->
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Invoice Date</label>
                        <input type="date" x-model="form.invoice_date"
                               class="w-full bg-navy-900 border border-navy-600 text-gray-200 rounded-lg px-3 py-2 text-sm focus:border-gold-400 focus:outline-none">
                    </div>

                    <!-- Payment terms -->
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Payment Terms (days)</label>
                        <input type="number" x-model.number="form.payment_terms_days" min="0" max="365"
                               class="w-full bg-navy-900 border border-navy-600 text-gray-200 rounded-lg px-3 py-2 text-sm focus:border-gold-400 focus:outline-none">
                    </div>
                </div>

                <!-- FX Rate display -->
                <div x-show="form.currency !== 'HKD'" class="mb-4 p-3 bg-navy-900 rounded-lg border border-navy-700">
                    <div class="flex items-center justify-between">
                        <span class="text-xs text-gray-400">FX Rate (1 <span x-text="form.currency"></span> = ? HKD)</span>
                        <div class="flex items-center gap-2">
                            <input type="number" x-model.number="form.fx_rate" step="0.0001" min="0"
                                   class="w-28 bg-navy-800 border border-navy-600 text-gray-200 rounded px-2 py-1 text-sm text-right focus:border-gold-400 focus:outline-none">
                            <button @click="fetchRate()"
                                    class="text-xs text-gold-400 hover:text-gold-300 underline">Refresh</button>
                        </div>
                    </div>
                </div>

                <!-- Line items -->
                <div class="mb-4">
                    <div class="flex items-center justify-between mb-2">
                        <h4 class="text-xs text-gray-400 uppercase tracking-wider">Line Items</h4>
                        <button @click="addItem()"
                                class="text-xs text-gold-400 hover:text-gold-300 flex items-center gap-1">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
                            </svg>
                            Add Item
                        </button>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="bg-navy-900/50">
                                <tr>
                                    <th class="px-3 py-2 text-left text-xs font-medium text-gray-400 uppercase">Description</th>
                                    <th class="px-3 py-2 text-right text-xs font-medium text-gray-400 uppercase w-20">Qty</th>
                                    <th class="px-3 py-2 text-right text-xs font-medium text-gray-400 uppercase w-28">Unit Price</th>
                                    <th class="px-3 py-2 text-right text-xs font-medium text-gray-400 uppercase w-28">Amount</th>
                                    <th class="px-3 py-2 text-left text-xs font-medium text-gray-400 uppercase w-24">HS Code</th>
                                    <th class="px-3 py-2 w-10"></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="(item, idx) in form.items" :key="idx">
                                    <tr class="border-b border-navy-700/50">
                                        <td class="px-1 py-1.5">
                                            <input type="text" x-model="item.description" placeholder="Item description"
                                                   class="w-full bg-navy-900 border border-navy-700 text-gray-200 rounded px-2 py-1.5 text-sm focus:border-gold-400 focus:outline-none">
                                        </td>
                                        <td class="px-1 py-1.5">
                                            <input type="number" x-model.number="item.quantity" min="0" step="0.01"
                                                   class="w-full bg-navy-900 border border-navy-700 text-gray-200 rounded px-2 py-1.5 text-sm text-right focus:border-gold-400 focus:outline-none">
                                        </td>
                                        <td class="px-1 py-1.5">
                                            <input type="number" x-model.number="item.unit_price" min="0" step="0.01"
                                                   class="w-full bg-navy-900 border border-navy-700 text-gray-200 rounded px-2 py-1.5 text-sm text-right focus:border-gold-400 focus:outline-none">
                                        </td>
                                        <td class="px-1 py-1.5 text-right text-gray-300">
                                            <span x-text="(item.quantity * item.unit_price).toFixed(2)"></span>
                                        </td>
                                        <td class="px-1 py-1.5">
                                            <input type="text" x-model="item.hs_code" placeholder="HS code"
                                                   class="w-full bg-navy-900 border border-navy-700 text-gray-200 rounded px-2 py-1.5 text-sm focus:border-gold-400 focus:outline-none">
                                        </td>
                                        <td class="px-1 py-1.5 text-center">
                                            <button @click="removeItem(idx)" class="text-red-400 hover:text-red-300">
                                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                                                </svg>
                                            </button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Notes -->
                <div class="mb-4">
                    <label class="block text-xs text-gray-400 mb-1">Notes</label>
                    <textarea x-model="form.notes" rows="2" placeholder="Additional notes…"
                              class="w-full bg-navy-900 border border-navy-600 text-gray-200 rounded-lg px-3 py-2 text-sm focus:border-gold-400 focus:outline-none resize-none"></textarea>
                </div>

                <!-- Actions -->
                <div class="flex items-center gap-3">
                    <button @click="createInvoice()"
                            :disabled="!form.customer_id || form.items.length === 0"
                            class="px-5 py-2.5 bg-gold-500 text-navy-900 rounded-lg font-medium text-sm hover:bg-gold-400 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
                        Create Invoice
                    </button>
                    <button @click="createAndPdf()"
                            :disabled="!form.customer_id || form.items.length === 0"
                            class="px-5 py-2.5 bg-navy-600 text-gray-200 rounded-lg font-medium text-sm hover:bg-navy-500 transition-colors border border-navy-500 disabled:opacity-40 disabled:cursor-not-allowed">
                        Create &amp; Generate PDF
                    </button>
                </div>
            </div>
        </div>

        <!-- Sidebar: totals & recent invoices -->
        <div class="space-y-4">
            <!-- Running totals -->
            <div class="bg-navy-800 rounded-xl border border-navy-700 p-5">
                <h3 class="text-sm font-semibold text-gold-400 mb-3">Invoice Total</h3>
                <div class="space-y-2">
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-400">Subtotal</span>
                        <span class="text-gray-200" x-text="form.currency + ' ' + subtotal.toFixed(2)"></span>
                    </div>
                    <div class="flex justify-between text-sm font-semibold border-t border-navy-700 pt-2">
                        <span class="text-gray-300">Total</span>
                        <span class="text-white" x-text="form.currency + ' ' + subtotal.toFixed(2)"></span>
                    </div>
                    <div x-show="form.currency !== 'HKD'" class="flex justify-between text-xs text-gray-500 pt-1">
                        <span>HKD Equivalent</span>
                        <span x-text="'HKD ' + (subtotal * form.fx_rate).toFixed(2)"></span>
                    </div>
                </div>
            </div>

            <!-- Recent invoices -->
            <div class="bg-navy-800 rounded-xl border border-navy-700 p-5">
                <h3 class="text-sm font-semibold text-gold-400 mb-3">Recent Invoices</h3>
                <div id="recent-invoices-list"
                     hx-get="/fx-invoice/api/invoices" hx-trigger="load, invoice-created from:body"
                     hx-swap="innerHTML" hx-target="#recent-invoices-list">
                    <p class="text-xs text-gray-500 text-center py-4">Loading…</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Status message -->
    <div x-show="message" x-transition
         class="fixed bottom-6 right-6 px-5 py-3 rounded-lg text-sm font-medium shadow-lg"
         :class="messageType === 'success' ? 'bg-emerald-500/90 text-white' : 'bg-red-500/90 text-white'">
        <span x-text="message"></span>
    </div>
</div>

<script>
function invoiceBuilder() {
    return {
        form: {
            customer_id: '',
            invoice_type: 'sales',
            currency: 'USD',
            incoterms: 'FOB',
            invoice_date: new Date().toISOString().split('T')[0],
            payment_terms_days: 30,
            fx_rate: 7.80,
            notes: '',
            items: [
                { description: '', quantity: 1, unit_price: 0, hs_code: '' },
            ],
        },
        message: '',
        messageType: 'success',

        get subtotal() {
            return this.form.items.reduce((sum, item) => sum + (item.quantity * item.unit_price), 0);
        },

        onCustomerChange() {
            const sel = document.querySelector(`option[value="${this.form.customer_id}"]`);
            if (sel) {
                const currency = sel.dataset.currency;
                const terms = sel.dataset.terms;
                if (currency) this.form.currency = currency;
                if (terms) this.form.payment_terms_days = parseInt(terms);
                this.fetchRate();
            }
        },

        addItem() {
            this.form.items.push({ description: '', quantity: 1, unit_price: 0, hs_code: '' });
        },

        removeItem(idx) {
            if (this.form.items.length > 1) this.form.items.splice(idx, 1);
        },

        async fetchRate() {
            if (this.form.currency === 'HKD') { this.form.fx_rate = 1; return; }
            try {
                const resp = await fetch('/fx-invoice/api/fx-rates');
                const data = await resp.json();
                const r = data.rates?.[this.form.currency];
                if (r && r.rate) {
                    this.form.fx_rate = parseFloat((1 / r.rate).toFixed(4));
                }
            } catch (e) { console.warn('Rate fetch failed', e); }
        },

        async createInvoice() {
            try {
                const resp = await fetch('/fx-invoice/api/invoices', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(this.form),
                });
                const data = await resp.json();
                if (data.id) {
                    this.showMessage(`Invoice ${data.invoice_number} created`, 'success');
                    document.body.dispatchEvent(new CustomEvent('invoice-created'));
                    return data;
                }
            } catch (e) {
                this.showMessage('Failed to create invoice', 'error');
            }
        },

        async createAndPdf() {
            const inv = await this.createInvoice();
            if (inv && inv.id) {
                try {
                    await fetch(`/fx-invoice/api/invoices/${inv.id}/pdf`, { method: 'POST' });
                    this.showMessage(`Invoice ${inv.invoice_number} created with PDF`, 'success');
                } catch (e) {
                    this.showMessage('Invoice created but PDF generation failed', 'error');
                }
            }
        },

        showMessage(text, type) {
            this.message = text;
            this.messageType = type;
            setTimeout(() => { this.message = ''; }, 4000);
        },
    };
}
</script>
