<div class="flex justify-between items-center mb-4">
    <h3 class="text-lg font-semibold text-gold-400">Price Comparison</h3>
    <div class="flex items-center gap-3">
        <input type="text" x-model="priceSearch" placeholder="Search product…"
               @input.debounce.400ms="loadPriceComparison()"
               class="bg-navy-800 border border-navy-600 rounded-lg px-3 py-1.5 text-sm min-w-[280px]">
    </div>
</div>

<div class="card overflow-hidden">
    <table class="w-full text-sm">
        <thead>
            <tr class="border-b border-navy-700 text-left text-gray-400">
                <th class="px-4 py-3 font-medium">Supplier</th>
                <th class="px-4 py-3 font-medium">Product</th>
                <th class="px-4 py-3 font-medium">Unit Price</th>
                <th class="px-4 py-3 font-medium">MOQ</th>
                <th class="px-4 py-3 font-medium">Lead Time</th>
                <th class="px-4 py-3 font-medium">Quality Rating</th>
            </tr>
        </thead>
        <tbody>
            <template x-if="priceData.length === 0">
                <tr>
                    <td colspan="6" class="px-4 py-12 text-center text-gray-500">
                        <svg class="w-10 h-10 mx-auto mb-3 text-navy-700" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
                        </svg>
                        Search for a product to compare prices across suppliers
                    </td>
                </tr>
            </template>
            <template x-for="row in priceData" :key="row.order_id">
                <tr class="border-b border-navy-700/50 hover:bg-navy-800/50 transition-colors">
                    <td class="px-4 py-3">
                        <div class="text-gray-200" x-text="row.company_name_cn"></div>
                        <div class="text-xs text-gray-500" x-text="row.company_name_en || ''"></div>
                    </td>
                    <td class="px-4 py-3 text-gray-300" x-text="row.product_description"></td>
                    <td class="px-4 py-3">
                        <span class="text-gold-400 font-medium"
                              x-text="row.unit_price ? row.currency + ' ' + row.unit_price.toFixed(2) : '—'"></span>
                    </td>
                    <td class="px-4 py-3 text-gray-300"
                        x-text="row.quantity ? row.quantity.toLocaleString() : '—'"></td>
                    <td class="px-4 py-3 text-gray-300" x-text="row.lead_time || '—'"></td>
                    <td class="px-4 py-3">
                        <div class="flex items-center gap-1">
                            <template x-for="i in 5">
                                <svg class="w-3.5 h-3.5"
                                     :class="i <= Math.round(row.reliability_score || 0) ? 'text-gold-400' : 'text-navy-700'"
                                     fill="currentColor" viewBox="0 0 20 20">
                                    <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
                                </svg>
                            </template>
                            <span class="text-xs text-gray-500 ml-1"
                                  x-text="(row.reliability_score || 0).toFixed(1)"></span>
                        </div>
                    </td>
                </tr>
            </template>
        </tbody>
    </table>
</div>
