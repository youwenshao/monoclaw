<div x-data="{
    inventory: [],
    loading: true,
    searchQuery: '',
    sortField: 'total_quantity',
    sortDir: 'desc',
    get filtered() {
        let items = this.inventory;
        if (this.searchQuery) {
            const q = this.searchQuery.toLowerCase();
            items = items.filter(i => (i.description || '').toLowerCase().includes(q) || (i.sku || '').toLowerCase().includes(q));
        }
        items.sort((a, b) => {
            const av = a[this.sortField] ?? '';
            const bv = b[this.sortField] ?? '';
            if (typeof av === 'number') return this.sortDir === 'asc' ? av - bv : bv - av;
            return this.sortDir === 'asc' ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
        });
        return items;
    },
    toggleSort(field) {
        if (this.sortField === field) { this.sortDir = this.sortDir === 'asc' ? 'desc' : 'asc'; }
        else { this.sortField = field; this.sortDir = 'desc'; }
    }
}" x-init="
    fetch('/stock-reconcile/api/inventory-summary')
        .then(r => r.json())
        .then(data => { inventory = data; loading = false; })
        .catch(() => { loading = false; });
">

    <!-- Summary stats -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
        <div class="bg-navy-800 rounded-lg border border-navy-700 p-3 text-center">
            <p class="text-xs text-gray-400">Unique Products</p>
            <p class="text-lg font-bold text-white" x-text="inventory.length"></p>
        </div>
        <div class="bg-navy-800 rounded-lg border border-navy-700 p-3 text-center">
            <p class="text-xs text-gray-400">Total Quantity</p>
            <p class="text-lg font-bold text-emerald-400" x-text="inventory.reduce((s, i) => s + (i.total_quantity || 0), 0).toLocaleString()"></p>
        </div>
        <div class="bg-navy-800 rounded-lg border border-navy-700 p-3 text-center">
            <p class="text-xs text-gray-400">Total Receipts</p>
            <p class="text-lg font-bold text-blue-400" x-text="inventory.reduce((s, i) => s + (i.receipt_count || 0), 0)"></p>
        </div>
        <div class="bg-navy-800 rounded-lg border border-navy-700 p-3 text-center">
            <p class="text-xs text-gray-400">Damaged Qty</p>
            <p class="text-lg font-bold text-red-400" x-text="inventory.reduce((s, i) => s + (i.damaged_qty || 0), 0).toLocaleString()"></p>
        </div>
    </div>

    <!-- Search -->
    <div class="mb-4">
        <input x-model="searchQuery" type="text" placeholder="Search by product name or SKU..."
               class="bg-navy-900 border border-navy-600 rounded px-3 py-1.5 text-sm text-white placeholder-gray-500 focus:border-gold-400 focus:outline-none w-80">
    </div>

    <!-- Inventory table -->
    <div class="overflow-auto rounded-lg border border-navy-700">
        <table class="w-full text-sm">
            <thead class="bg-navy-800 sticky top-0">
                <tr>
                    <th class="text-left px-3 py-2 text-gray-400 font-medium text-xs cursor-pointer hover:text-white"
                        @click="toggleSort('description')">
                        Product
                        <span x-show="sortField==='description'" x-text="sortDir==='asc' ? '↑' : '↓'" class="text-gold-400"></span>
                    </th>
                    <th class="text-left px-3 py-2 text-gray-400 font-medium text-xs cursor-pointer hover:text-white"
                        @click="toggleSort('sku')">
                        SKU
                        <span x-show="sortField==='sku'" x-text="sortDir==='asc' ? '↑' : '↓'" class="text-gold-400"></span>
                    </th>
                    <th class="text-left px-3 py-2 text-gray-400 font-medium text-xs">Unit</th>
                    <th class="text-right px-3 py-2 text-gray-400 font-medium text-xs cursor-pointer hover:text-white"
                        @click="toggleSort('total_quantity')">
                        Total Qty
                        <span x-show="sortField==='total_quantity'" x-text="sortDir==='asc' ? '↑' : '↓'" class="text-gold-400"></span>
                    </th>
                    <th class="text-right px-3 py-2 text-gray-400 font-medium text-xs">Damaged</th>
                    <th class="text-center px-3 py-2 text-gray-400 font-medium text-xs cursor-pointer hover:text-white"
                        @click="toggleSort('receipt_count')">
                        Receipts
                        <span x-show="sortField==='receipt_count'" x-text="sortDir==='asc' ? '↑' : '↓'" class="text-gold-400"></span>
                    </th>
                    <th class="text-left px-3 py-2 text-gray-400 font-medium text-xs cursor-pointer hover:text-white"
                        @click="toggleSort('last_received')">
                        Last Received
                        <span x-show="sortField==='last_received'" x-text="sortDir==='asc' ? '↑' : '↓'" class="text-gold-400"></span>
                    </th>
                </tr>
            </thead>
            <tbody class="divide-y divide-navy-700">
                <template x-for="item in filtered" :key="item.product_key">
                    <tr class="hover:bg-navy-800/50">
                        <td class="px-3 py-2 text-white" x-text="item.description"></td>
                        <td class="px-3 py-2 text-gray-300 font-mono text-xs" x-text="item.sku || '—'"></td>
                        <td class="px-3 py-2 text-gray-400" x-text="item.unit || 'pcs'"></td>
                        <td class="px-3 py-2 text-right text-white font-semibold" x-text="(item.total_quantity || 0).toLocaleString()"></td>
                        <td class="px-3 py-2 text-right">
                            <span :class="item.damaged_qty > 0 ? 'text-red-400' : 'text-gray-500'"
                                  x-text="item.damaged_qty || 0"></span>
                        </td>
                        <td class="px-3 py-2 text-center text-gray-300" x-text="item.receipt_count"></td>
                        <td class="px-3 py-2 text-gray-400 text-xs" x-text="item.last_received || '—'"></td>
                    </tr>
                </template>
                <tr x-show="filtered.length === 0 && !loading">
                    <td colspan="7" class="px-3 py-8 text-center text-gray-500">No inventory data — reconcile shipments to build inventory</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Loading -->
    <div x-show="loading" class="flex items-center justify-center py-8">
        <svg class="animate-spin h-5 w-5 text-gold-400" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
    </div>
</div>
