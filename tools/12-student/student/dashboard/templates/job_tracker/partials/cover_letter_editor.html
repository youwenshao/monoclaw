<div class="space-y-4">
    <div class="flex items-center justify-between">
        <h3 class="text-sm font-semibold text-gold-400">
            Cover Letter{% if job.title %} — {{ job.title }} at {{ job.company }}{% endif %}
        </h3>
        <button onclick="navigator.clipboard.writeText(document.getElementById('cover-letter-text').value)"
                class="text-xs text-gold-400 hover:text-gold-300 flex items-center gap-1">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9.75a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184"/>
            </svg>
            Copy
        </button>
    </div>

    <textarea id="cover-letter-text"
              class="w-full bg-navy-900 border border-navy-600 rounded-lg px-4 py-3 text-sm text-gray-100 focus:ring-gold-500 focus:border-gold-500 resize-y leading-relaxed"
              rows="20">{{ cover_letter }}</textarea>

    <div class="flex gap-3">
        <button onclick="navigator.clipboard.writeText(document.getElementById('cover-letter-text').value)"
                class="px-4 py-2 rounded-lg text-sm font-medium bg-gold-500 text-navy-900 hover:bg-gold-400 transition-colors">
            Copy to Clipboard
        </button>
    </div>
</div>
