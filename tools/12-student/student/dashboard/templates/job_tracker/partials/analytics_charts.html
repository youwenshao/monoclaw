<div class="space-y-6">

    <!-- Stats row -->
    <div class="grid grid-cols-3 gap-4">
        <div class="bg-navy-800 rounded-lg p-4">
            <p class="text-xs text-gray-400">Response Rate</p>
            <p class="text-2xl font-bold text-white mt-1">{{ (response_rate * 100)|round|int }}%</p>
        </div>
        <div class="bg-navy-800 rounded-lg p-4">
            <p class="text-xs text-gray-400">Total in Pipeline</p>
            <p class="text-2xl font-bold text-white mt-1">{{ funnel.counts|sum }}</p>
        </div>
        <div class="bg-navy-800 rounded-lg p-4 flex items-center justify-between">
            <div>
                <p class="text-xs text-gray-400">Snapshot</p>
                <p class="text-xs text-gray-500 mt-1">Save current stats</p>
            </div>
            <button hx-post="/job-tracker/analytics/snapshot" hx-swap="none"
                    class="px-3 py-1.5 rounded-lg text-xs font-medium bg-gold-500 text-navy-900 hover:bg-gold-400 transition-colors">
                Save
            </button>
        </div>
    </div>

    <!-- Charts -->
    <div class="grid grid-cols-2 gap-6">
        <!-- Funnel Chart -->
        <div class="bg-navy-800 rounded-lg p-5">
            <h3 class="text-sm font-semibold text-gold-400 mb-4">Application Funnel</h3>
            <canvas id="funnelChart" height="250"></canvas>
        </div>

        <!-- Weekly Volume -->
        <div class="bg-navy-800 rounded-lg p-5">
            <h3 class="text-sm font-semibold text-gold-400 mb-4">Weekly Applications</h3>
            <canvas id="weeklyChart" height="250"></canvas>
        </div>
    </div>

</div>

<script>
(function() {
    const funnelLabels = {{ funnel.stages | tojson }};
    const funnelData = {{ funnel.counts | tojson }};

    const funnelColors = [
        '#6b7280', '#3b82f6', '#06b6d4', '#8b5cf6',
        '#f59e0b', '#f97316', '#10b981', '#22c55e',
    ];

    new Chart(document.getElementById('funnelChart'), {
        type: 'bar',
        data: {
            labels: funnelLabels.map(s => s.replace('_', ' ')),
            datasets: [{
                data: funnelData,
                backgroundColor: funnelColors,
                borderRadius: 4,
                barThickness: 28,
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#9ca3af' } },
                y: { grid: { display: false }, ticks: { color: '#d1d5db', font: { size: 11 } } }
            }
        }
    });

    const weeklyData = {{ weekly | tojson }};
    new Chart(document.getElementById('weeklyChart'), {
        type: 'line',
        data: {
            labels: weeklyData.map(w => w.week),
            datasets: [{
                label: 'Applications',
                data: weeklyData.map(w => w.count),
                borderColor: '#eab308',
                backgroundColor: 'rgba(234,179,8,0.1)',
                fill: true,
                tension: 0.3,
                pointRadius: 4,
                pointBackgroundColor: '#eab308',
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#9ca3af', font: { size: 10 } } },
                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#9ca3af', stepSize: 1 }, beginAtZero: true }
            }
        }
    });
})();
</script>
