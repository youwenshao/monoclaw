<div class="bg-navy-800 rounded-xl px-4 py-3 max-w-[85%]">
    {% if answer %}
    <p class="text-sm text-gray-200 whitespace-pre-wrap">{{ answer }}</p>
    {% if citations %}
    <div class="mt-2 pt-2 border-t border-navy-600">
        <p class="text-xs text-gray-500 mb-1">Sources:</p>
        {% for cit in citations %}
        <p class="text-xs text-gray-400">
            • {{ cit.document_title|default('Unknown') }} p.{{ cit.page_number }}
        </p>
        {% endfor %}
    </div>
    {% endif %}
    {% else %}
    <p class="text-sm text-gray-500">No answer generated.</p>
    {% endif %}
</div>
