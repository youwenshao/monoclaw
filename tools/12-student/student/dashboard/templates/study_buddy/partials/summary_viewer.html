{% if summary %}
<div class="card p-6">
    <div class="flex items-center justify-between mb-4">
        <h4 class="text-sm font-semibold text-gold-400">
            {% if detail_level == 'brief' %}Brief Summary
            {% elif detail_level == 'key_concepts' %}Key Concepts
            {% else %}Detailed Summary{% endif %}
        </h4>
        <span class="text-xs px-2 py-0.5 rounded-full bg-navy-700 text-gray-400">{{ detail_level }}</span>
    </div>
    <div class="prose prose-invert prose-sm max-w-none text-gray-200 leading-relaxed whitespace-pre-wrap">{{ summary }}</div>
</div>
{% else %}
<div class="text-center py-12">
    <svg class="w-12 h-12 mx-auto text-gray-600 mb-3" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
    </svg>
    <p class="text-gray-500 text-sm">Select a document and detail level, then click Generate.</p>
</div>
{% endif %}
