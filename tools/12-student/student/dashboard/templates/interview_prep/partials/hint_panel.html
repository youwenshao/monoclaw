<div class="space-y-3">
    <div class="flex items-center justify-between">
        <h4 class="text-xs font-semibold text-gold-400">Hint Level {{ level }}</h4>
        {% if level < 3 %}
        <button hx-get="/interview-prep/hint-panel/partial?problem_id={{ problem_id }}&level={{ level + 1 }}"
                hx-target="closest div"
                hx-swap="outerHTML"
                class="text-xs text-gray-400 hover:text-gold-400 transition-colors">
            Next hint →
        </button>
        {% endif %}
    </div>
    <p class="text-sm text-gray-300">{{ hint }}</p>
</div>
