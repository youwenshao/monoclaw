<div class="space-y-6">
    <h3 class="text-lg font-semibold text-gold-400">Site Safety Supervision Summary (SSSS)</h3>

    <div class="card p-6 max-w-xl">
        <form hx-post="/safety-form/reports/ssss"
              hx-target="#ssss-result"
              hx-swap="innerHTML"
              hx-indicator="#ssss-spinner"
              class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1">Site</label>
                <select name="site_id" required
                        class="w-full bg-navy-800 border border-navy-600 rounded-lg px-3 py-2 text-sm">
                    <option value="">Select site...</option>
                    {% for site in sites %}
                    <option value="{{ site.id }}">{{ site.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Report Date</label>
                <input type="date" name="report_date" required
                       class="w-full bg-navy-800 border border-navy-600 rounded-lg px-3 py-2 text-sm">
            </div>
            <div class="flex items-center gap-3">
                <button type="submit" class="btn btn-primary">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
                    </svg>
                    Generate SSSS Report
                </button>
                <span id="ssss-spinner" class="htmx-indicator text-gray-400">
                    <svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                </span>
            </div>
        </form>

        <div id="ssss-result" class="mt-4">
            {% if pdf_url %}
            <div class="p-4 bg-green-900/30 border border-green-700/50 rounded-lg">
                <div class="flex items-center gap-3">
                    <svg class="w-8 h-8 text-green-400 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <div>
                        <p class="text-sm font-medium text-green-400">Report generated successfully</p>
                        <a href="{{ pdf_url }}" target="_blank"
                           class="text-sm text-gold-400 hover:text-gold-300 underline mt-1 inline-flex items-center gap-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/>
                            </svg>
                            Download SSSS Report (PDF)
                        </a>
                    </div>
                </div>
            </div>
            {% endif %}
        </div>
    </div>
</div>
