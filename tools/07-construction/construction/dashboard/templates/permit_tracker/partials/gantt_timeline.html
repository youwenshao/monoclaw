{% set status_colors = {
    'Received': '#3b82f6',
    'Under Examination': '#f59e0b',
    'Amendments Required': '#ef4444',
    'Approved': '#22c55e',
    'Rejected': '#ef4444',
    'Withdrawn': '#6b7280'
} %}

<div id="gantt-partial" class="bg-navy-800 border border-navy-700 rounded-lg p-4" style="min-height:400px;"></div>

<!-- Legend -->
<div class="flex flex-wrap gap-4 mt-3 px-1">
    <div class="flex items-center gap-1.5">
        <span class="w-3 h-3 rounded-sm" style="background:#3b82f6"></span>
        <span class="text-xs text-gray-400">Received</span>
    </div>
    <div class="flex items-center gap-1.5">
        <span class="w-3 h-3 rounded-sm" style="background:#f59e0b"></span>
        <span class="text-xs text-gray-400">Under Examination</span>
    </div>
    <div class="flex items-center gap-1.5">
        <span class="w-3 h-3 rounded-sm" style="background:#ef4444"></span>
        <span class="text-xs text-gray-400">Amendments Required / Overdue</span>
    </div>
    <div class="flex items-center gap-1.5">
        <span class="w-3 h-3 rounded-sm" style="background:#22c55e"></span>
        <span class="text-xs text-gray-400">Approved</span>
    </div>
</div>

<script>
(function () {
    const submissions = {{ submissions | tojson }};
    const statusColors = {{ status_colors | tojson }};

    if (!submissions.length) {
        document.getElementById('gantt-partial').innerHTML =
            '<p class="text-sm text-gray-500 text-center py-12">No submissions to display on timeline.</p>';
        return;
    }

    const tasks = submissions.map(s => s.project_name + ' — ' + (s.bd_reference || s.submission_type));
    const starts = submissions.map(s => s.submitted_date);
    const ends = submissions.map(s => s.expected_completion || s.submitted_date);
    const colors = submissions.map(s => {
        if (s.is_overdue) return statusColors['Amendments Required'];
        return statusColors[s.current_status] || '#6b7280';
    });
    const hoverText = submissions.map(s =>
        (s.bd_reference || '') + '<br>' + s.current_status + '<br>Days elapsed: ' + (s.days_elapsed || 0)
    );

    const trace = {
        type: 'bar',
        orientation: 'h',
        y: tasks,
        x: ends.map((e, i) => {
            const ms = new Date(e) - new Date(starts[i]);
            return Math.max(ms / 86400000, 1);
        }),
        base: starts,
        marker: { color: colors },
        text: hoverText,
        hoverinfo: 'text',
        textposition: 'none'
    };

    const layout = {
        paper_bgcolor: 'rgba(0,0,0,0)',
        plot_bgcolor: 'rgba(0,0,0,0)',
        font: { color: '#d1d5db', size: 11 },
        xaxis: { type: 'date', gridcolor: '#1e293b', tickformat: '%d %b %Y' },
        yaxis: { autorange: 'reversed', gridcolor: '#1e293b' },
        margin: { l: 240, r: 20, t: 20, b: 40 },
        height: Math.max(400, submissions.length * 36),
        bargap: 0.3
    };

    Plotly.newPlot('gantt-partial', [trace], layout, { responsive: true, displayModeBar: false });
})();
</script>
