tool_name: construction
version: "1.0.0"
port: 8503

llm:
  provider: mock
  model_path: "mlx-community/Qwen2.5-7B-Instruct-4bit"
  embedding_model_path: "mlx-community/bge-small-en-v1.5-4bit"

messaging:
  whatsapp_enabled: false
  twilio_account_sid: ""
  twilio_auth_token: ""
  twilio_whatsapp_from: ""
  telegram_enabled: false
  telegram_bot_token: ""
  default_language: en

database:
  workspace_path: "~/OpenClawWorkspace/construction"
  encryption_key: ""

auth:
  pin_hash: ""
  session_ttl_hours: 24

extra:
  # Company profile (set during first-run wizard)
  company_profile:
    company_name: ""
    ap_registration: ""
    rse_registration: ""
    office_address: ""

  # PermitTracker settings
  permit_tracker:
    scrape_interval_hours: 4
    business_hours_only: true
    bd_portal_credentials: {}
    expected_timelines:
      GBP: 60
      foundation: 45
      superstructure: 45
      drainage: 30
      OP: 90
      minor_works_I: 42
      minor_works_II: 28
      minor_works_III: 14

  # SafetyForm settings
  safety_form:
    checklist_schedule: "08:00"
    photo_quality: "medium"
    ssss_enabled: true
    heat_stress_threshold: 33

  # DefectsManager settings
  defects_manager:
    default_priority: "normal"
    contractor_scoring_weights:
      response_time: 0.4
      quality: 0.3
      cost: 0.2
      communication: 0.1

  # SiteCoordinator settings
  site_coordinator:
    dispatch_time_evening: "18:00"
    dispatch_time_morning: "07:00"
    working_hours: { start: "08:00", end: "18:00" }
    noise_permit_hours: { start: "07:00", end: "19:00" }
    typhoon_mode: false

  # HK public holidays 2026
  hk_public_holidays:
    - "2026-01-01"
    - "2026-01-29"
    - "2026-01-30"
    - "2026-01-31"
    - "2026-04-03"
    - "2026-04-04"
    - "2026-04-06"
    - "2026-05-01"
    - "2026-05-24"
    - "2026-06-19"
    - "2026-07-01"
    - "2026-09-26"
    - "2026-10-01"
    - "2026-10-17"
    - "2026-10-26"
    - "2026-12-25"
    - "2026-12-26"
